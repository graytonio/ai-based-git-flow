name: AI Plan

on:
  issues:
    types: [opened]
  workflow_call:
    secrets:
      anthropic-api-key:
        description: 'Anthropic API key'
        required: true
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key (fallback for native trigger)'
        required: false
    inputs:
      needs-plan-review-label:
        description: 'Label to apply when plan is ready for review'
        required: false
        default: 'needs-plan-review'
        type: string
      needs-human-intervention-label:
        description: 'Label to apply on agent failure'
        required: false
        default: 'needs-human-intervention'
        type: string
      planner-initial-prompt:
        description: 'Path to custom planner prompt (relative to repo root). Omit to use built-in default.'
        required: false
        default: ''
        type: string
      allowed-actors:
        description: 'Comma-separated list of GitHub usernames allowed to trigger this workflow. If empty, defaults to collaborators and above (OWNER, MEMBER, COLLABORATOR).'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check actor authorization
        id: check
        env:
          ACTOR: ${{ github.event.issue.user.login }}
          AUTHOR_ASSOCIATION: ${{ github.event.issue.author_association }}
          ALLOWED_ACTORS: ${{ inputs.allowed-actors }}
        run: |
          if [ -n "$ALLOWED_ACTORS" ]; then
            IFS=',' read -ra LIST <<< "$ALLOWED_ACTORS"
            for user in "${LIST[@]}"; do
              trimmed=$(echo "$user" | xargs)
              if [ "$trimmed" = "$ACTOR" ]; then
                echo "should-run=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
            echo "Actor '$ACTOR' is not in the allowed list — skipping" >&2
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "$AUTHOR_ASSOCIATION" == "OWNER" || "$AUTHOR_ASSOCIATION" == "MEMBER" || "$AUTHOR_ASSOCIATION" == "COLLABORATOR" ]]; then
              echo "should-run=true" >> "$GITHUB_OUTPUT"
            else
              echo "Actor '$ACTOR' has association '$AUTHOR_ASSOCIATION' — skipping" >&2
              echo "should-run=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  plan:
    needs: guard
    if: needs.guard.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch ai-git-flow resources
        uses: actions/checkout@v4
        with:
          repository: graytonio/ai-based-git-flow
          ref: main
          path: _ai-git-flow
          sparse-checkout: |
            .github/prompts
            .claude/plugins/superpowers

      - name: Prepare prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CUSTOM_PROMPT: ${{ inputs.planner-initial-prompt }}
        run: |
          python3 -c "
          import os
          custom = os.environ.get('CUSTOM_PROMPT', '').strip()
          path = custom if custom else '_ai-git-flow/.github/prompts/planner-initial.md'
          with open(path) as f:
              t = f.read()
          t = t.replace('{{ISSUE_NUMBER}}', os.environ['ISSUE_NUMBER'])
          t = t.replace('{{ISSUE_TITLE}}', os.environ['ISSUE_TITLE'])
          t = t.replace('{{ISSUE_BODY}}', os.environ['ISSUE_BODY'])
          with open(os.environ['RUNNER_TEMP'] + '/prompt.md', 'w') as f:
              f.write(t)
          "

      - name: Run planner agent
        uses: ./.github/actions/planner
        with:
          anthropic-api-key: ${{ secrets.anthropic-api-key || secrets.ANTHROPIC_API_KEY }}
          prompt-file: ${{ env.RUNNER_TEMP }}/prompt.md

      - name: Apply needs-plan-review label
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          LABEL: ${{ inputs.needs-plan-review-label || 'needs-plan-review' }}
        run: |
          BRANCH="plan/issue-${ISSUE_NUMBER}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" --add-label "$LABEL"
          fi

      - name: Apply needs-human-intervention on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          LABEL: ${{ inputs.needs-human-intervention-label || 'needs-human-intervention' }}
        run: |
          BRANCH="plan/issue-${ISSUE_NUMBER}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr edit "$PR_NUMBER" --add-label "$LABEL"
          fi
